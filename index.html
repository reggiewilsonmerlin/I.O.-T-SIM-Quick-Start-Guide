<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#00D4FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IOTSIM Guide">
<meta name="description" content="Infinite Outcome Trade Simulator — Quick Start Guide v26">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">
<title>IOTSIM Quick Start Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg:#0a0c10;--panel:#111318;--surface:#181c24;--border:#262d3a;
  --accent:#00D4FF;--accent2:#FF6B35;--green:#00c853;--red:#ff1744;
  --gold:#ffd600;--purple:#aa00ff;--cyan:#00D4FF;
  --text:#e0e4ea;--dim:#6b7280;--bright:#f5f6f8;
  --font:'DM Sans',system-ui,sans-serif;--mono:'Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}

#app{display:flex;height:100vh;height:100dvh}

/* Sidebar */
#sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
#sidebar .hdr{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
#sidebar .hdr h1{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:2.5px;margin:0}
#sidebar .hdr p{font-size:11px;color:var(--dim);margin-top:3px}
#sidebar nav{flex:1;overflow-y:auto;padding:8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;border-left:3px solid transparent;color:var(--dim);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:#ffffff08;color:var(--text)}
.nav-item.active{background:#00D4FF15;border-left-color:var(--accent);color:var(--bright);font-weight:700}
.nav-item .ico{font-size:17px;flex-shrink:0}
#sidebar .foot{padding:10px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);text-align:center}

/* Mobile */
#mob-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:8px;font-size:20px;cursor:pointer;line-height:1}
#mob-overlay{display:none;position:fixed;inset:0;z-index:199;background:#0a0c10f0;padding:60px 20px;overflow-y:auto}
#mob-overlay.show{display:block}
@media(max-width:740px){
  #sidebar{display:none}
  #mob-toggle{display:block}
}

/* Content */
#content{flex:1;overflow-y:auto;padding:32px 40px 100px}
@media(max-width:740px){#content{padding:60px 18px 100px}}
#content-inner{max-width:820px;margin:0 auto}

/* Typography */
.h1{font-size:30px;font-weight:800;color:var(--accent);margin:0 0 10px;padding-bottom:12px;border-bottom:3px solid var(--accent);line-height:1.25}
.h2{font-size:21px;font-weight:700;color:var(--accent2);margin:30px 0 10px}
.h3{font-size:17px;font-weight:700;color:var(--bright);margin:22px 0 8px}
.p{font-size:15px;line-height:1.8;margin:10px 0}
.b{font-weight:700;color:var(--bright)}
.bc{font-weight:700}

/* Callout */
.callout{border-left:4px solid var(--accent);border-radius:0 10px 10px 0;padding:16px 20px;margin:16px 0}
.callout .ct{font-weight:700;font-size:15px;margin-bottom:6px}
.callout .cb{font-size:14px;line-height:1.7}

/* Screenshot placeholder */
.ss{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;margin:16px 0;background:var(--surface)}
.ss .st{font-size:14px;font-weight:600;color:var(--dim)}
.ss .sd{font-size:13px;color:var(--dim);margin-top:6px;font-style:italic}

/* Tables */
.tbl-wrap{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;background:var(--bg);color:var(--bright);font-weight:700;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--border)}
.tbl tr:nth-child(even) td{background:var(--panel)}
.tbl tr:nth-child(odd) td{background:var(--surface)}
.tbl .a{color:var(--accent);font-weight:600;font-family:var(--mono)}

/* Nav buttons */
.nav-btns{display:flex;justify-content:space-between;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--dim);transition:all .2s}
.nav-btn:hover{filter:brightness(1.2)}
.nav-btn.next{background:#00D4FF18;border-color:#00D4FF55;color:var(--accent);font-weight:700}

/* Numbered step */
.step{display:flex;gap:12px;margin:14px 0;align-items:flex-start}
.step .num{min-width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}

/* Monitor card */
.mcard{background:var(--surface);border-radius:8px;padding:13px 17px;margin:10px 0;border:1px solid var(--border)}
.mcard .mt{font-weight:700;font-size:15px;color:var(--accent2)}
.mcard .md{font-size:13px;margin:4px 0}
.mcard .mu{font-size:13px;color:var(--green);font-style:italic}

/* Preset tabs */
.ptabs{display:flex;gap:6px;margin:16px 0;flex-wrap:wrap}
.ptab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.ptab:hover{border-color:var(--accent);color:var(--accent)}
.ptab.on{background:#00D4FF18;border-color:var(--accent);color:var(--accent)}

/* Calculator */
.calc{background:var(--surface);border-radius:10px;padding:20px;border:1px solid var(--border);margin:12px 0}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.calc-grid{grid-template-columns:1fr}}
.calc label{font-size:11px;color:var(--dim);display:block;margin-bottom:4px}
.calc input{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:var(--mono)}
.calc input:focus{outline:1px solid var(--accent)}
.calc-results{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.calc-box{flex:1;min-width:140px;background:var(--panel);border-radius:8px;padding:12px;text-align:center}
.calc-box .cl{font-size:11px;color:var(--dim)}
.calc-box .cv{font-size:20px;font-weight:800;font-family:var(--mono);margin-top:4px}

/* Install banner */
#install-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);padding:12px 20px;z-index:300;text-align:center}
#install-bar.show{display:block}
#install-btn{background:var(--accent);color:#000;border:none;padding:10px 24px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font)}
#install-btn:hover{filter:brightness(1.15)}
#install-dismiss{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:13px;margin-left:12px;font-family:var(--font)}
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="hdr"><h1>♾️ IOTSIM</h1><p>Quick Start Guide • v26</p></div>

    <div class="foot">© Reggie_W 2026+</div>

<div id="install-bar">
  <span style="color:var(--text);font-size:14px;margin-right:8px">📲 Install this guide for offline access</span>

  <button id="install-dismiss" onclick="dismissInstall()">Not now</button>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const SECTIONS=[
{id:"welcome",title:"Welcome",icon:"🚀"},
{id:"first-load",title:"First Load",icon:"📦"},
{id:"emoji-legend",title:"Emoji Legend",icon:"🏷️"},
{id:"label-anatomy",title:"Trade Labels",icon:"🔖"},
{id:"settings",title:"Settings Overview",icon:"⚙️"},
{id:"account",title:"Account & Risk",icon:"💰"},
{id:"presets",title:"Asset Presets",icon:"🎯"},
{id:"monitor",title:"Insight Monitor",icon:"📊"},
{id:"switches",title:"Quick Switches",icon:"🎛️"},
{id:"next",title:"Next Steps",icon:"⏩"},
{id:"closing",title:"What's Next?",icon:"📚"},
];

let active="welcome";
let presetTab=0;

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const e=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const tbl=(hdrs,rows,accent)=>{
  let h=hdrs.map(x=>`<th>${x}</th>`).join('');
  let r=rows.map(row=>`<tr>${row.map((c,i)=>`<td${i===0&&accent?' class="a"':''}>${c}</td>`).join('')}</tr>`).join('');
  return`<div class="tbl-wrap"><table class="tbl"><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table></div>`;
};
const callout=(emoji,title,body,col='var(--accent)')=>`<div class="callout" style="border-left-color:${col};background:${col}11"><div class="ct" style="color:${col}">${emoji} ${title}</div><div class="cb">${body}</div></div>`;
const ss=d=>`<div class="ss"><div class="st">📷 INSERT SCREENSHOT</div><div class="sd">${d}</div></div>`;
const sTable=(title,rows)=>{
  let h=['Setting','Recommended','Why'].map(x=>`<th>${x}</th>`).join('');
  let r=rows.map(([s,v,d])=>`<tr><td class="a">${s}</td><td style="font-family:var(--mono);color:var(--accent)">${v}</td><td>${d}</td></tr>`).join('');
  return`<div class="h3" style="color:var(--accent2);margin-top:18px">${title}</div><div class="tbl-wrap"><table class="tbl"><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table></div>`;
};

// ═══════════════════════════════════════
// SECTIONS CONTENT
// ═══════════════════════════════════════
const content={
welcome:()=>`
<div style="text-align:center;margin:-10px 0 20px"><img src="./logo.png" alt="IOTSIM" style="max-width:100%;border-radius:12px;box-shadow:0 8px 40px #00D4FF22"></div>

<p class="p"><span class="bc" style="color:var(--red)">✘ No longer</span> doubting your trading abilities after a bad run of losses.</p>
<p class="p"><span class="bc" style="color:var(--red)">✘ No longer</span> wondering what the odds are or whether price action is in your favour after entering a position.</p>
<div style="height:20px"></div>
<p class="p"><span class="bc" style="color:var(--green)">✔ Now</span> you fine-tune your own trading model exactly to your liking.</p>
<p class="p"><span class="bc" style="color:var(--green)">✔ Now</span> you use the Insight Monitor to tweak, refine, and validate your setup with real statistics.</p>
<p class="p"><span class="bc" style="color:var(--green)">✔ Now</span> you know how your unique configuration has performed recently and over time — before you've even entered a trade.</p>
<p class="p"><span class="bc" style="color:var(--green)">✔ Now</span> you create alerts for your custom model and walk away from the chart. When the alert sounds, you open the charts, check the statistics, read the price action, and make your decision with full confidence.</p>

"first-load":()=>`
<div class="h1">Adding the Indicator & First Load</div>
<p class="p">Open any chart on TradingView, click the <span class="b">Indicators</span> button (or press /), and search for <span class="b">"V26 IOTSIM"</span> or <span class="b">"Infinite Outcome Trade Simulator"</span>. Click to add it.</p>

"emoji-legend":()=>`

"label-anatomy":()=>`

<div class="h2">Entry Label</div>

settings:()=>`

<p class="p">37 settings groups. Most optional. Focus on ★ essentials first:</p>
${tbl(['#','Group','Purpose'],[['★ 1','Monitor & Output','Which Insight Monitor page to display'],['★ 2','Quick Switches','Toggle detected/active/closed/missed visibility'],['★ 3','Backtest Engine','Scan mode, lookback bars, avg/median'],['★ 4','Account & Risk','Contracts, margin, leverage, value type'],['★ 5','Global Trade Mgmt','Direction, mirroring, 2nd chance, EOD, HTF'],['6–12','Long Setup','Entry, targets, SL, modifiers, filters, model options'],['13–19','Short Setup','Mirror of Long — or independent'],['20','Partial Profits','Partial TP levels and sizing'],['21','Dollar & Tick Filters','Min profit, max DD, circuit breaker'],['22–23','Killzones & Macros','ICT session and macro filters'],['★ 24','Dashboard Rows','Which stats appear on Full Stats'],['★ 25','Dashboard Aesthetics','Monitor position, size, colours'],['26–34','Visuals & Labels','Structure, FVG/OB colours, label styles, emojis'],['35–37','Limits, Dates, System','Max trades, date range, alerts']],true)}
<p class="p"><span class="bc" style="color:var(--gold)">★ = Configure these first.</span> The rest can stay on defaults.</p>
`,

    <div class="calc-box"><div class="cl">Buying Power</div><div class="cv" id="c_bp" style="color:var(--accent2)">$10,000</div></div>
    <div class="calc-box"><div class="cl">PnL on 2% Move</div><div class="cv" id="c_pnl" style="color:var(--green)">$195.00</div></div>
  </div>
</div>
<div class="h2">Ticks Mode</div>
<p class="p"><span class="b">Alternative:</span> Set Global Value to "Ticks" for raw price movement. Common for intraday index futures traders.</p>
`,

presets:()=>{
const presets=[
{tab:'NQ/ES/YM',title:'Index Futures (NQ, ES, YM)',desc:'Highly liquid, predictable sessions. ICT Killzones align perfectly. TFs: 1m–5m.',tables:[

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  // Sidebar
  document.getElementById('nav').innerHTML=SECTIONS.map(s=>`<div class="nav-item${s.id===active?' active':''}" onclick="go('${s.id}')"><span class="ico">${s.icon}</span>${s.title}</div>`).join('');
  document.getElementById('mob-nav').innerHTML=SECTIONS.map(s=>`<div class="nav-item${s.id===active?' active':''}" onclick="go('${s.id}')" style="font-size:16px;padding:14px 18px">${s.icon} ${s.title}</div>`).join('');
  
  // Content
  const idx=SECTIONS.findIndex(s=>s.id===active);
  const prev=idx>0?SECTIONS[idx-1]:null;
  const next=idx<SECTIONS.length-1?SECTIONS[idx+1]:null;
  
  let nav='<div class="nav-btns">';
  nav+=prev?`<button class="nav-btn" onclick="go('${prev.id}')">← ${prev.title}</button>`:'<div></div>';
  nav+=next?`<button class="nav-btn next" onclick="go('${next.id}')">${next.title} →</button>`:'<div></div>';
  nav+='</div>';
  
  document.getElementById('content-inner').innerHTML=content[active]()+nav;
  if(active==='account')calcPnl();
}

function go(id){
  active=id;
  render();
  document.getElementById('content').scrollTop=0;
  closeMobileForce();
}

function calcPnl(){
  const m=parseFloat(document.getElementById('c_margin')?.value)||0;
  const l=parseFloat(document.getElementById('c_lev')?.value)||0;
  const q=parseFloat(document.getElementById('c_qty')?.value)||0;
  const e=parseFloat(document.getElementById('c_entry')?.value)||1;
  const bp=m*l;
  const move=e*0.02;
  const pnl=(move*bp/e)*q;
  const bpEl=document.getElementById('c_bp');
  const pnlEl=document.getElementById('c_pnl');
  if(bpEl)bpEl.textContent='$'+bp.toLocaleString();
  if(pnlEl){pnlEl.textContent='$'+pnl.toFixed(2);pnlEl.style.color=pnl>=0?'var(--green)':'var(--red)';}
}

// Mobile
function toggleMobile(){
  document.getElementById('mob-overlay').classList.toggle('show');
  document.getElementById('mob-toggle').textContent=document.getElementById('mob-overlay').classList.contains('show')?'✕':'☰';
}
function closeMobile(e){if(e.target.id==='mob-overlay')closeMobileForce()}
function closeMobileForce(){document.getElementById('mob-overlay').classList.remove('show');document.getElementById('mob-toggle').textContent='☰'}

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-bar').classList.add('show')});
function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-bar').classList.remove('show')})}}
function dismissInstall(){document.getElementById('install-bar').classList.remove('show')}
window.addEventListener('appinstalled',()=>{document.getElementById('install-bar').classList.remove('show')});

// Init
render();

// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
